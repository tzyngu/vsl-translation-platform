<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}VSL Studio{% endblock %}</title>
  <link rel="icon" type="image/png" href="/static/images/logo_hand.png">
  <link rel="stylesheet" href="/static/css/app.css?v=20260602-login-background">
</head>
<body class="{% if request.user.is_authenticated %}authenticated{% endif %}" data-backend-url="{{ backend_url }}">
  <header>
    <a class="brand" href="/">VSL Studio</a>
    <nav>
      {% if request.user.is_authenticated %}
      <a href="/">Camera</a>
      <a href="/gestures/">Ký hiệu</a>
      <a href="/gestures/new/">Upload</a>
      <a href="/library/">Thư viện</a>
      <a href="/training/">Train</a>
      <a href="/models/">Models</a>
      {% if request.user.is_staff %}<a href="/admin/">Admin</a>{% endif %}
      <span class="nav-user"><img src="{{ avatar_url|default:'/static/images/avatar1.png' }}" alt="Avatar"><span>{{ request.user.username }}</span></span>
      <form class="inline" method="post" action="/logout/">{% csrf_token %}<button class="link-button" type="submit">Đăng xuất</button></form>
      {% endif %}
    </nav>
  </header>
  <main>
    <div id="global-message" class="message hidden"></div>
    {% block content %}{% endblock %}
  </main>
  <script src="/static/js/app.js?v=20260602-library-uploader"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
